name: IIDX Arena Scraper

on:
#  schedule:
#    # 10分ごとに実行 (UTC表記のため注意)
#    - cron: '*/10 * * * *'
  workflow_dispatch: # 手動実行用のボタンも設置

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 実行結果をリポジトリに書き込む権限

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Scraper
      run: python arena_full_scraper.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        # web_data.jsonに変更があればコミットしてプッシュ
        git add web_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update arena status [skip ci]" && git push)
